<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GithubIssueTracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Font Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind plus DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header
      class="header-container flex flex-col md:flex-row md:items-center justify-between gap-4 md:gap-0 p-4 md:p-6 border-b border-[#E9E9E9] shadow-sm"
    >
      <div class="logo flex items-center gap-2 justify-center md:justify-start">
        <img src="./assets/github-logo.png" class="w-10 h-10" />
        <h1 class="text-xl sm:text-2xl md:text-3xl font-bold">
          GitHub Issues Tracker
        </h1>
      </div>
      <div
        class="search flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full md:w-auto"
      >
        <label class="input w-full md:w-auto">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input
            id="searchInput"
            type="search"
            required
            placeholder="Search issues..."
          />
        </label>
        <button class="btn btn-primary w-full sm:w-auto">+ New Issue</button>
      </div>
    </header>
    <div
      class="bodyContainer container mx-auto mt-6 md:mt-16 shadow-sm flex items-center rounded-xl"
    >
      <div
        class="buttons flex flex-col sm:flex-row items-stretch sm:items-center gap-3 p-4 w-full"
      >
        <button
          id="allBtn"
          class="btn btn-outline w-full sm:w-[120px] h-[40px] active"
        >
          All
        </button>
        <button
          id="openBtn"
          class="btn btn-outline w-full sm:w-[120px] h-[40px]"
        >
          Open
        </button>
        <button
          id="closedBtn"
          class="btn btn-outline w-full sm:w-[120px] h-[40px]"
        >
          Closed
        </button>
      </div>
    </div>
    <div
      class="mid-head container mx-auto mt-4 shadow-sm p-4 md:p-2 flex flex-col md:flex-row md:items-center justify-between gap-4 md:gap-0 border-b border-[#E9E9E9] rounded-t-xl"
    >
      <div class="flex items-center gap-4">
        <div
          class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center"
        >
          <img src="./assets/Aperture.png" alt="" />
        </div>
        <div class="">
          <h2 id="issueCountText" class="font-semibold text-xl">0 Issues</h2>
          <p class="text-gray-600">Track and manage your project issues</p>
        </div>
      </div>
      <div
        class="flex items-center justify-start md:justify-end gap-4 text-sm w-full md:w-auto"
      >
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-green-500"></div>
          <span class="text-[#52637A] font-semibold">Open</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-purple-500"></div>
          <span class="text-[#52637A] font-semibold">Closed</span>
        </div>
      </div>
    </div>
    <div
      id="cardContainer"
      class="card-container container mx-auto bg-white border border-[#E9E9E9] border-t-0 rounded-b-xl shadow-sm p-4 md:p-6 grid grid-cols-1 md:grid-cols-4 gap-4"
    ></div>
    <section id="spinner" class="flex justify-center items-center py-10 hidden">
      <span class="loading loading-spinner loading-xl"></span>
    </section>
    <dialog id="issueDetailsModal" class="modal">
      <div class="modal-box max-w-2xl">
        <div id="modalContent"></div>

        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./javaScript/dashboard.js"></script>
  </body>
</html>
